# Reload configuration.
unbind r
bind r source-file ~/.tmux.conf

# Use Ctrl-s as the tmux prefix.
set -g prefix C-s

set -g mouse on
set -g extended-keys on
set -g extended-keys-format csi-u

# Start windows and panes at 1.
set -g base-index 1
setw -g pane-base-index 1

set -g allow-passthrough on

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# switch windows alt+number
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

set -g status-position top

# TPM plugins. Install TPM during bootstrap; tmux still works without it.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize TPM when it is available. Do not clone or install during tmux startup.
if-shell '[ -f ~/.tmux/plugins/tpm/tpm ]' 'run-shell ~/.tmux/plugins/tpm/tpm'
